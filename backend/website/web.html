<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>理財小幫手 AI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
    .page { display: none; animation: fadeIn 0.3s ease-out; }
    .page.active { display: block; }
    .tab-active { color: #059669; }
    .tab-active svg { color: #059669; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .demo-badge { animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    /* Overlay Styles */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
    .overlay.active { display: flex; }

    /* Side Drawer */
    #side-drawer { position: fixed; top: 0; right: -100%; width: 80%; max-width: 300px; height: 100%; background: white; z-index: 110; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -10px 0 25px rgba(0,0,0,0.1); }
    #side-drawer.open { right: 0; }

    /* Loading Spinner */
    .spinner { border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid #10b981; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-200 min-h-screen pb-20 overflow-x-hidden flex justify-center">
  
  <div class="w-full max-w-md bg-white min-h-screen shadow-2xl flex flex-col relative">

    <!-- Header -->
    <header class="bg-white px-5 py-4 flex justify-between items-center sticky top-0 z-50 border-b border-slate-100">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-emerald-600 rounded-lg flex items-center justify-center text-white shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </div>
        <div>
          <h1 class="font-bold text-lg text-slate-800 leading-none">理財小幫手</h1>
          <span id="demo-mode-indicator" class="hidden text-[10px] text-amber-500 font-bold demo-badge">● 測試預覽模式</span>
        </div>
      </div>
      
      <div class="flex items-center gap-3">
        <button onclick="toggleDrawer(true)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-600 active:bg-slate-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
        </button>
      </div>
    </header>

    <!-- Side Drawer -->
    <div id="drawer-overlay" class="overlay" onclick="toggleDrawer(false)"></div>
    <div id="side-drawer" class="flex flex-col">
      <div class="p-8 bg-emerald-600 text-white">
        <div class="w-16 h-16 bg-white/20 rounded-2xl mb-4 flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        </div>
        <p id="drawer-user-name" class="font-bold text-xl">訪客</p>
        <p id="drawer-user-id" class="text-xs text-emerald-100 font-mono opacity-60 mt-1">ID: ---</p>
      </div>
      
      <nav class="flex-1 p-4 space-y-2 mt-4">
        <button onclick="showPage('home')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-50 transition-all">
          <span class="font-bold text-slate-700">首頁總覽</span>
        </button>
        <button onclick="showPage('feature1')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-50 transition-all">
          <span class="font-bold text-slate-700">深度分析</span>
        </button>
      </nav>
      <div class="p-8 border-t border-slate-100 text-[10px] text-slate-400 font-bold uppercase tracking-widest text-center">Version 2.0.2</div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 p-5 space-y-6 overflow-y-auto">

      <!-- Page: 總覽 -->
      <section id="page-home" class="page active">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-2xl font-black text-slate-800 tracking-tight">資產總覽</h2>
          <span id="data-loading-indicator" class="hidden text-[10px] bg-slate-100 text-slate-400 px-2 py-1 rounded-lg">載入數據中...</span>
        </div>
        
        <div class="bg-gradient-to-br from-emerald-600 to-teal-700 rounded-[2rem] p-6 text-white shadow-xl mb-6 relative overflow-hidden">
          <p class="text-emerald-100/80 text-[10px] font-bold uppercase tracking-widest mb-1">總資產估算</p>
          <h3 id="display-balance" class="text-3xl font-bold">$ --,---</h3>
          <div class="mt-8 grid grid-cols-2 gap-4">
            <div class="bg-white/10 p-3 rounded-2xl">
              <p class="text-[9px] uppercase font-bold text-emerald-100">本月收入</p>
              <p id="display-income" class="text-sm font-bold">+$ --,---</p>
            </div>
            <div class="bg-white/10 p-3 rounded-2xl">
              <p class="text-[9px] uppercase font-bold text-emerald-100">本月支出</p>
              <p id="display-expense" class="text-sm font-bold">-$ --,---</p>
            </div>
          </div>
        </div>

        <div class="h-40 bg-slate-50 p-4 rounded-3xl border border-slate-100">
          <canvas id="mainChart"></canvas>
        </div>
      </section>

      <!-- Page: 功能一 (AI 分析) -->
      <section id="page-feature1" class="page">
        <h2 class="text-2xl font-black text-slate-800 mb-2">⚡ 深度分析</h2>
        <div class="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100">
          <p class="text-xs text-slate-500 italic">此功能將連線後端進行大數據分析...</p>
        </div>
      </section>

    </main>

    <!-- Navigation Bar -->
    <nav class="bg-white border-t border-slate-100 py-3 px-6 flex justify-around items-center sticky bottom-0 z-50">
      <button onclick="showPage('home')" id="nav-home" class="flex flex-col items-center gap-1 text-slate-300 tab-active">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
        <span class="text-[9px] font-bold">總覽</span>
      </button>
      <button onclick="showPage('feature1')" id="nav-feature1" class="flex flex-col items-center gap-1 text-slate-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
        <span class="text-[9px] font-bold">分析</span>
      </button>
    </nav>

  </div>

<script type="module">
  /* =============================
     理財小幫手 – 穩定可上線版本
     ============================= */

  // --- 1. 基本設定 ---
  const LIFF_ID = "2008065321-vlAGLNjW";
  const API_BASE = "https://financial-agent.it.com";
  const IS_LOCAL = ["localhost", "127.0.0.1"].includes(location.hostname);

  let state = {
    balance: 0,
    income: 0,
    expense: 0,
    userName: "",
    userId: "",           // 🔒 永遠完整
    userIdDisplay: ""     // 👀 僅顯示用
  };

  // --- 2. 向後端抓資料 ---
  async function fetchUserData(userId) {
    const loader = document.getElementById("data-loading-indicator");
    loader?.classList.remove("hidden");

    try {
      const res = await fetch(`${API_BASE}/api/get_user_data`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId })
      });

      if (!res.ok) throw new Error("backend error");

      const data = await res.json();
      state.income = data.income ?? 0;
      state.expense = data.expense ?? 0;
      state.balance = data.balance ?? 0;

    } catch (e) {
      console.warn("後端尚未就緒，使用示範資料");
      state.income = 62000;
      state.expense = 32500;
      state.balance = 45280;
    } finally {
      loader?.classList.add("hidden");
      updateUI();
    }
  }

  // --- 3. 更新 UI ---
  function updateUI() {
    document.getElementById("display-balance")?.textContent =
      `$${state.balance.toLocaleString()}`;
    document.getElementById("display-income")?.textContent =
      `+$${state.income.toLocaleString()}`;
    document.getElementById("display-expense")?.textContent =
      `-$${state.expense.toLocaleString()}`;
    document.getElementById("drawer-user-name")?.textContent =
      state.userName;
    document.getElementById("drawer-user-id")?.textContent =
      `ID: ${state.userIdDisplay}`;
  }

  // --- 4. App 初始化 ---
  async function initApp() {
    if (IS_LOCAL) {
      // 🔧 本地開發模式
      document.getElementById("demo-mode-indicator")?.classList.remove("hidden");
      state.userName = "LOCAL 開發者";
      state.userId = "LOCAL-DEV-USER-ID";
      state.userIdDisplay = "LOCAL";
      await fetchUserData(state.userId);
      initChart();
      return;
    }

    // 🔐 正式 LIFF 模式
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isInClient()) {
      document.body.innerHTML = `
        <div class="min-h-screen flex items-center justify-center text-center p-6">
          <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="text-lg font-bold mb-2">請從 LINE 開啟</h2>
            <p class="text-sm text-slate-600">
              請由 LINE Bot 點擊進入本頁
            </p>
          </div>
        </div>`;
      return;
    }

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    state.userName = profile.displayName;
    state.userId = profile.userId;
    state.userIdDisplay = profile.userId.slice(0, 8) + "…";

    await fetchUserData(state.userId);
    initChart();
  }

  // --- 5. 導覽控制 ---
  window.showPage = (page) => {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("tab-active"));
    document.getElementById(`page-${page}`)?.classList.add("active");
    document.getElementById(`nav-${page}`)?.classList.add("tab-active");
    toggleDrawer(false);
  };

  window.toggleDrawer = (show) => {
    document.getElementById("side-drawer").classList.toggle("open", show);
    document.getElementById("drawer-overlay").classList.toggle("active", show);
  };

  // --- 6. 圖表 ---
  function initChart() {
    const canvas = document.getElementById("mainChart");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    new Chart(ctx, {
      type: "line",
      data: {
        labels: ["M","T","W","T","F","S","S"],
        datasets: [{
          data: [600,800,450,1200,900,1500,1100],
          borderColor: "#10b981",
          tension: 0.4,
          borderWidth: 2,
          pointRadius: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { display: false }, x: { grid: { display: false } } }
      }
    });
  }

  window.addEventListener("DOMContentLoaded", () => {
    // 確保至少有一頁會顯示（避免 .page 全部被 display:none）
    window.showPage?.("home");
    initApp();
  });
</script>
