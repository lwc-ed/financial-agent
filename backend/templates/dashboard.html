<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>理財小幫手 Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont; }
    .page { display: none; }
    .page.active { display: block; }
    .tab-active { color: #059669; }
  </style>
</head>

<body class="bg-slate-200 min-h-screen flex justify-center">

<div class="w-full max-w-md bg-white min-h-screen shadow-xl flex flex-col">

  <!-- Header -->
  <header class="px-5 py-4 border-b flex justify-between items-center">
    <h1
      class="font-bold text-lg cursor-pointer"
      onclick="showPage('home')"
    >
      理財小幫手
    </h1>
    <button onclick="toggleDrawer(true)">☰</button>
  </header>

  <!-- Side Drawer -->
  <div id="drawer-overlay" class="hidden fixed inset-0 bg-black/40" onclick="toggleDrawer(false)"></div>
  <div id="side-drawer" class="fixed top-0 right-[-100%] w-64 h-full bg-white shadow transition-all">
    <div class="p-6 bg-emerald-600 text-white">
      <p id="drawer-user-name" class="font-bold">---</p>
      <p id="drawer-user-id" class="text-xs opacity-80 break-all"></p>
    </div>
    <div class="p-4 space-y-2">
      <button
        onclick="toggleDrawer(false); showPage('saving')"
        class="w-full text-left px-3 py-2 rounded hover:bg-slate-100 text-slate-700"
      >
        💰 儲蓄挑戰
      </button>
    </div>
  </div>

  <!-- Main -->
  <main class="flex-1 p-5 space-y-4 overflow-y-auto">

    <section id="page-home" class="page active">
      <p id="hi-user" class="text-xs text-slate-500 mb-2"></p>

      <h2 class="text-xl font-bold mb-2">資產總覽</h2>

      <div class="bg-emerald-600 text-white rounded-xl p-4 mb-4">
        <p class="text-xs opacity-80">總資產</p>
        <p id="display-balance" class="text-2xl font-bold">$0</p>
      </div>

      <div class="h-40 bg-slate-100 rounded p-2">
        <canvas id="mainChart"></canvas>
      </div>
    </section>

    <section id="page-saving" class="page">
      <h2 class="text-xl font-bold mb-2">儲蓄挑戰</h2>

      <!-- 寵物挑戰列表 -->
      <div id="saving-pet-list" class="grid grid-cols-1 gap-4">
        <!-- JS 會動態插入寵物卡片 -->
      </div>


    </section>

    <!-- Floating Add Button -->
    <button
      id="fab-add-wishlist"
      onclick="openWishlistPicker()"
      class="hidden fixed bottom-6 right-6 w-14 h-14 rounded-full
             bg-emerald-600 text-white text-3xl
             shadow-lg flex items-center justify-center"
    >
      +
    </button>

    <!-- Wishlist Picker Modal -->
    <div
      id="wishlist-modal"
      class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50"
    >
      <div class="bg-white w-80 rounded-xl p-4">
        <h3 class="font-bold mb-2">選擇願望清單項目</h3>

        <select
          id="wishlist-select"
          class="w-full border rounded px-2 py-1"
        >
          <option>載入中...</option>
        </select>

        <div class="flex justify-end mt-4 space-x-2">
          <button
            onclick="closeWishlistPicker()"
            class="px-3 py-1 text-sm"
          >取消</button>
          <button
            onclick="confirmCreateChallenge()"
            class="px-3 py-1 text-sm bg-emerald-600 text-white rounded"
          >
            確定
          </button>
        </div>
      </div>
    </div>
    <!-- Pet Selection Modal -->
    <div
      id="pet-modal"
      class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50"
    >
      <div class="bg-white rounded-xl w-80 p-4">
        <h3 class="font-bold mb-3 text-center">選擇你的夥伴</h3>

        <div
          id="pet-option-grid"
          class="grid grid-cols-4 gap-3 mb-4"
        >
          <!-- JS 會動態插入寵物選項 -->
        </div>

        <div class="flex justify-end gap-2">
          <button
            onclick="closePetPickerModal()"
            class="px-3 py-1 text-sm rounded border"
          >
            取消
          </button>
          <button
            onclick="confirmPetSelection()"
            class="px-3 py-1 text-sm bg-emerald-600 text-white rounded"
          >
            確定
          </button>
        </div>
      </div>
    </div>

    <!-- Pet Interaction Modal -->
    <div
      id="pet-interact-modal"
      class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 pointer-events-auto"
    >
      <div class="bg-white rounded-xl w-80 p-4 pointer-events-auto">
        <h3 id="pet-title" class="font-bold text-center mb-2"></h3>

        <p id="pet-stage" class="text-center text-sm text-slate-500 mb-2"></p>

        <div class="h-32 bg-slate-100 rounded flex items-center justify-center mb-3">
          <div id="pet-animation"></div>
        </div>

        <div class="text-sm mb-2">
          <p>目前：$<span id="pet-current"></span></p>
          <p>目標：$<span id="pet-target"></span></p>
        </div>

        <div class="w-full bg-slate-200 rounded h-2 mb-3">
          <div
            id="pet-progress"
            class="bg-emerald-600 h-2 rounded"
            style="width: 0%"
          ></div>
        </div>

        <input
          id="feed-input"
          type="number"
          placeholder="存入金額"
          class="w-full border rounded px-2 py-1 mb-3"
        />

        <div class="flex justify-end gap-2">
          <button
            type="button"
            onclick="closePetModal()"
            class="text-sm"
          >
            取消
          </button>
          <button
            onclick="feedPet()"
            class="bg-emerald-600 text-white text-sm px-3 py-1 rounded"
          >
            餵食
          </button>
        </div>
      </div>
    </div>


  </main>

</div>

<script type="module" src="/static/js/app.js"></script>

</body>
</html>
