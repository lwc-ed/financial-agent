<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入成功</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    h2 {
      font-size: 1.8rem;
      color: #333;
    }
  </style>
</head>
<body>
  <h2>🎉 歡迎使用我們的 AI Agent 🎉</h2>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    async function main() {
      await liff.init({ liffId: "2008065321-vlAGLNjW" });

      // 取得 LINE 使用者 ID
      const profile = await liff.getProfile();
      const lineUserId = profile.userId;

      // 從模板變數拿 Google ID
      const googleId = "{{ google_id }}";

      // 綁定 Google 與 LINE
      await fetch("https://financial-agent.it.com/bind", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ lineUserId, googleId })
      });

      // 5 秒後自動關閉回到 LINE
      setTimeout(() => {
        liff.closeWindow();
      }, 5000);
    }

    main();
  </script>
</body>
</html>
